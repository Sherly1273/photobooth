<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="results-page">
  <div class="page-bg"></div>

  <div class="results-wrapper">

    <!-- Tombol kiri -->
    <button class="results-btn" onclick="downloadStrip()">Download</button>

    <!-- Strip tengah -->
    <div class="results-strip" id="results-strip">
      <div class="results-photo" id="res1"></div>
      <div class="results-photo" id="res2"></div>
      <div class="results-photo" id="res3"></div>
    </div>

    <!-- Tombol kanan -->
    <button class="results-btn" onclick="location.href='main.html'">Back</button>

  </div>
</div>

<canvas id="dl-canvas" style="display:none;"></canvas>

<script>
  const frameImages = {
    polkadot:  "url('frame1.jfif')",
    butterfly: "url('frame2.jfif')",
    floral:    "url('frame3.jfif')",
    leopard:   "url('frame4.jfif')",
    ldr:       "url('frame5.jfif')",
    star:      "url('frame6.jfif')",
  };

  /* Terapkan frame */
  const frame = localStorage.getItem('selectedFrame') || 'polkadot';
  const strip = document.getElementById('results-strip');
  strip.style.backgroundImage = frameImages[frame];
  strip.style.backgroundSize = 'cover';
  strip.style.backgroundPosition = 'center';

  /* Tampilkan foto */
  const photos = JSON.parse(localStorage.getItem('photos') || '[]');
  photos.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    document.getElementById('res' + (i + 1)).appendChild(img);
  });

  /* Download strip */
  function downloadStrip() {
  if (photos.length < 3) return;

  /* Ambil ukuran dari elemen asli */
  const stripEl = document.getElementById('results-strip');
  const photoEl = document.querySelector('.results-photo');
  const stripStyle = getComputedStyle(stripEl);
  const photoStyle = getComputedStyle(photoEl);

  const W = stripEl.offsetWidth;
  const H = stripEl.offsetHeight;
  const PAD = parseInt(stripStyle.paddingLeft);
  const GAP = parseInt(stripStyle.gap);
  const PH = photoEl.offsetHeight;
  const TOP = parseInt(stripStyle.paddingTop);

  const c = document.getElementById('dl-canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  const frameFiles = {
    polkadot:  'frame1.jfif',
    butterfly: 'frame2.jfif',
    floral:    'frame3.jfif',
    leopard:   'frame4.jfif',
    ldr:       'frame5.jfif',
    star:      'frame6.jfif',
  };

  const frameSrc = frameFiles[frame] || 'frame1.jfif';
  const frameImg = new Image();
  frameImg.crossOrigin = 'anonymous';
  frameImg.onload = () => {
    ctx.drawImage(frameImg, 0, 0, W, H);

    let loaded = 0;
    photos.forEach((src, i) => {
      const img = new Image();
      img.onload = () => {
        const y = TOP + i * (PH + GAP);
        ctx.save();
        roundRect(ctx, PAD, y, W - PAD * 2, PH, 0);
        ctx.clip();
        ctx.translate(PAD + (W - PAD * 2), y);
        ctx.scale(-1, 1);
        ctx.drawImage(img, 0, 0, W - PAD * 2, PH);
        ctx.restore();
        loaded++;
        if (loaded === 3) {
          const a = document.createElement('a');
          a.download = 'cei-photobooth.jpg';
          a.href = c.toDataURL('image/jpeg', 0.92);
          a.click();
        }
      };
      img.src = src;
    });
  };
  frameImg.src = frameSrc;
}

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }
</script>

</body>
</html>
